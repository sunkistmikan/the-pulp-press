<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Pulp Press</title>
  <style>
    /* Base Styles */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #222222;
      padding-bottom: 70px; /* Space so the bottom nav doesn't cover content */
    }

    /* Top Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background-color: #ffffff;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 22px;
      font-weight: 900;
      color: #ff500a; /* Signature Orange */
      letter-spacing: -0.5px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn-premium {
      background-color: #f0e6ff;
      color: #5c16c5;
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 14px;
    }
    .icon-placeholder {
      font-size: 18px;
    }
    .profile-icon {
      width: 32px;
      height: 32px;
      background-color: #222;
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
    }

    /* Hero Banner */
    .hero-banner {
      margin: 16px;
      padding: 30px 20px;
      background: linear-gradient(135deg, #2b1b54, #8b3a75);
      color: white;
      border-radius: 12px;
    }
    .hero-banner h2 {
      margin: 0 0 10px 0;
      font-size: 24px;
      line-height: 1.2;
    }
    .hero-banner p {
      margin: 0 0 20px 0;
      font-size: 15px;
      line-height: 1.4;
      opacity: 0.9;
    }
    .hero-banner button {
      background-color: transparent;
      color: white;
      border: 1px solid white;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 14px;
    }

    /* Book Shelves */
    .book-shelf {
      margin: 32px 0;
    }
    .shelf-header {
      padding: 0 16px;
      margin-bottom: 16px;
    }
    .shelf-subtitle {
      margin: 0 0 4px 0;
      font-size: 15px;
      color: #666;
    }
    .shelf-header h2 {
      margin: 0;
      font-size: 22px;
      font-weight: bold;
    }
    
    /* Horizontal Scroll Area */
    .horizontal-scroll {
      display: flex;
      overflow-x: auto;
      gap: 12px;
      padding: 0 16px;
      scrollbar-width: none; /* Hides scrollbar in Firefox */
    }
    .horizontal-scroll::-webkit-scrollbar {
      display: none; /* Hides scrollbar in Chrome/Safari */
    }

    /* Book Cards */
    .book-card {
      display: flex;
      flex-direction: column;
      width: 130px;
      flex-shrink: 0;
    }
    .cover-placeholder {
      width: 100%;
      height: 200px;
      background-color: #333;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      position: relative;
    }
    .cover-badge {
      position: absolute;
      top: 0;
      left: 0;
      background-color: #ff500a;
      color: white;
      padding: 4px 8px;
      border-top-left-radius: 8px;
      border-bottom-right-radius: 8px;
      font-weight: 900;
      font-size: 12px;
    }
    .book-tag {
      font-size: 12px;
      background-color: #f2f2f2;
      padding: 4px 8px;
      border-radius: 6px;
      align-self: flex-start;
      margin-bottom: 6px;
      font-weight: 600;
      color: #333;
    }
    .view-count {
      font-size: 13px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    /* Progress Bar for 'Continue Reading' */
    progress {
      width: 100%;
      height: 4px;
      appearance: none;
      margin-top: 4px;
    }
    progress::-webkit-progress-bar {
      background-color: #eee;
      border-radius: 2px;
    }
    progress::-webkit-progress-value {
      background-color: #ff500a;
      border-radius: 2px;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: #ffffff;
      border-top: 1px solid #eaeaea;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: none;
      border: none;
      color: #888;
      position: relative;
    }
    .nav-item.active {
      color: #ff500a;
    }
    .nav-icon {
      font-size: 24px;
      margin-bottom: 2px;
    }
    .nav-badge {
      position: absolute;
      top: -4px;
      right: -8px;
      background-color: #ff500a;
      color: white;
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- Top Header -->
  <header>
    <div class="logo">Pulp</div>
    <div class="header-actions">
      <button class="btn-premium">⚡ Try Premium</button>
      <span class="icon-placeholder">🎁</span>
      <div class="profile-icon">ME</div>
    </div>
  </header>

  <main>
    <!-- Hero Banner -->
    <section class="hero-banner">
      <h2>Mula draft patungong pangarap</h2>
      <p>Isumite ang iyong kuwento. Tingnan ang maaabot nito.</p>
      <button>GAWIN NATIN ITO</button>
    </section>

    <!-- Category Shelf: Enemies to lovers -->
    <section class="book-shelf">
      <div class="shelf-header">
        <p class="shelf-subtitle">20 years of tension</p>
        <h2>Enemies to lovers</h2>
      </div>
      
      <div class="horizontal-scroll">
        <article class="book-card">
          <div class="cover-placeholder" style="background-color: #1a1a1a;">
            <div class="cover-badge">W</div>
            Cover
          </div>
          <span class="book-tag">trust</span>
          <span class="view-count">👁 59.1M</span>
        </article>
        
        <article class="book-card">
          <div class="cover-placeholder" style="background-color: #d4a373;">
            <div class="cover-badge">W</div>
            Cover
          </div>
          <span class="book-tag">originals</span>
          <span class="view-count">👁 183K</span>
        </article>
        
        <article class="book-card">
          <div class="cover-placeholder" style="background-color: #a8dadc;">
            <div class="cover-badge">W</div>
            Cover
          </div>
          <span class="book-tag">secondchance</span>
          <span class="view-count">👁 948K</span>
        </article>
      </div>
    </section>

    <!-- Category Shelf: Continue reading -->
    <section class="book-shelf">
      <div class="shelf-header">
        <h2>Continue reading</h2>
      </div>
      
      <div class="horizontal-scroll">
        <article class="book-card">
          <div class="cover-placeholder" style="background-color: #e9c46a;">Cover</div>
          <progress value="20" max="100"></progress>
        </article>
        
        <article class="book-card">
          <div class="cover-placeholder" style="background-color: #264653;">Cover</div>
          <progress value="85" max="100"></progress>
        </article>

        <article class="book-card">
          <div class="cover-placeholder" style="background-color: #2a9d8f;">Cover</div>
          <progress value="5" max="100"></progress>
        </article>
      </div>
    </section>
  </main>

  <!-- Bottom Navigation Bar -->
  <nav class="bottom-nav">
    <button class="nav-item active">
      <span class="nav-icon">🏠</span>
    </button>
    <button class="nav-item">
      <span class="nav-icon">🔍</span>
    </button>
    <button class="nav-item">
      <span class="nav-icon">📚</span>
    </button>
    <button class="nav-item">
      <span class="nav-icon">✍️</span>
    </button>
    <button class="nav-item">
      <span class="nav-icon">🔔</span>
      <span class="nav-badge">33</span>
    </button>
  </nav>

</body>
  </html>
